<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>

  <!-- Open Graph: la miniatura YA lleva el play + marca de agua integrados, así que
       usamos un card de imagen grande (website) para evitar un segundo botón de play. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="YouTube">
  <meta property="og:title" content="{{ title }}">
  <meta property="og:description" content="{{ description }}">
  <meta property="og:image" content="{{ image }}">
  <meta property="og:image:width" content="1280">
  <meta property="og:image:height" content="720">
  <meta property="og:url" content="{{ target }}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ title }}">
  <meta name="twitter:description" content="{{ description }}">
  <meta name="twitter:image" content="{{ image }}">

  <!-- Redirección para humanos (los bots de preview solo leen el <head>) -->
  <meta http-equiv="refresh" content="0; url={{ target }}">
  <link rel="canonical" href="{{ target }}">
  <script>window.location.replace({{ target | tojson }});</script>

  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background:#0f1115; color:#e7e9ee;
           display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; }
    a { color:#5b8cff; }
  </style>
</head>
<body>
  <p>Abriendo el vídeo… si no avanza, <a href="{{ target }}">haz clic aquí</a>.</p>
</body>
</html>
